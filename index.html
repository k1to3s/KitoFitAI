// GEMINI CONFIG — using correct API endpoint with proper CORS support
// ════════════════════════════════════════════════════════
const GKEY = 'AQ.Ab8RN6L_qiXv2IXDEuebBFGqRbHOuYZFML5kmkNH9UvlNHfgug';

const GURL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GKEY;

// ════════════════════════════════════════════════════════
// STORAGE HELPERS — simple localStorage with namespacing
// ════════════════════════════════════════════════════════
const ss = (k, v) => { try { localStorage.setItem('kf2_' + k, JSON.stringify(v)); } catch(e) {} };
const sg = k => { try { const r = localStorage.getItem('kf2_' + k); return r ? JSON.parse(r) : null; } catch(e) { return null; } };
const sd = k => { try { localStorage.removeItem('kf2_' + k); } catch(e) {} };

// ════════════════════════════════════════════════════════
// AUTH HELPERS
// ════════════════════════════════════════════════════════
async function hashPw(p) {
  const e = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', e.encode(p), 'PBKDF2', false, ['deriveBits']);
  const b = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: e.encode('kitofit_salt_2025'), iterations: 50000, hash: 'SHA-256' }, km, 256);
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}
const validEm = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
const validPw = p => p.length < 8 ? 'Min 8 characters.' : !/[A-Z]/.test(p) ? 'Need one uppercase letter.' : !/[0-9]/.test(p) ? 'Need one number.' : null;
const getUsers = () => sg('users') || {};
const saveUsers = u => ss('users', u);
const getSess = () => { const s = sg('sess'); if (!s || s.exp < Date.now()) { sd('sess'); return null; } return getUsers()[s.em] || null; };
const escH = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function setBtn(id, html, disabled) {
  const el = document.getElementById(id);
  if (el) { el.innerHTML = html; el.disabled = !!disabled; }
}

function swTab(t) {
  document.querySelectorAll('.atab').forEach((el, i) => el.classList.toggle('on', t === 'login' ? i === 0 : i === 1));
  document.getElementById('f-login').classList.toggle('on', t === 'login');
  document.getElementById('f-signup').classList.toggle('on', t === 'signup');
}

async function doLogin() {
  const em = document.getElementById('l-em').value.trim().toLowerCase();
  const pw = document.getElementById('l-pw').value;
  const e = document.getElementById('le');
  e.classList.remove('show');
  if (!em || !pw) { e.textContent = 'Fill in all fields.'; e.classList.add('show'); return; }
  if (!validEm(em)) { e.textContent = 'Invalid email format.'; e.classList.add('show'); return; }
  setBtn('login-btn', '<span class="spin"></span>Signing in...', true);
  const users = getUsers();
  const u = users[em];
  if (!u) { e.textContent = 'No account found with this email.'; e.classList.add('show'); setBtn('login-btn','Sign In',false); return; }
  const hash = await hashPw(pw);
  if (u.passwordHash !== hash) { e.textContent = 'Incorrect password.'; e.classList.add('show'); setBtn('login-btn','Sign In',false); return; }
  ss('sess', { em, exp: Date.now() + 604800000 });
  setBtn('login-btn','Sign In',false);
  initApp(u);
}

async function doSignup() {
  const n = document.getElementById('su-n').value.trim();
  const em = document.getElementById('su-em').value.trim().toLowerCase();
  const pw = document.getElementById('su-pw').value;
  const e = document.getElementById('se'), s = document.getElementById('ss');
  e.classList.remove('show'); s.classList.remove('show');
  if (!n || !em || !pw) { e.textContent = 'Name, email and password are required.'; e.classList.add('show'); return; }
  if (!validEm(em)) { e.textContent = 'Invalid email format.'; e.classList.add('show'); return; }
  const pe = validPw(pw); if (pe) { e.textContent = pe; e.classList.add('show'); return; }
  const users = getUsers();
  if (users[em]) { e.textContent = 'An account with this email already exists.'; e.classList.add('show'); return; }
  setBtn('signup-btn','<span class="spin"></span>Creating...', true);
  const hash = await hashPw(pw);
  const nu = {
    email: em, name: n, passwordHash: hash, split: 'ppl', customSplit: null,
    goals: ['Build Muscle'], experience: 'intermediate',
    body: { weight: '', weightUnit: 'lbs', height: '', heightUnit: 'cm', age: '', sex: 'male', goalWeight: '', calTarget: '' },
    bodyMeasurements: { chest: '', waist: '', hips: '', arms: '' },
    notifications: { workout: true, ci: true, workoutTime: '07:30', ciTime: '20:00' },
    createdAt: Date.now(), onboardingDone: false
  };
  users[em] = nu; saveUsers(users);
  ss('sess', { em, exp: Date.now() + 604800000 });
  s.textContent = 'Account created — setting up your profile...'; s.classList.add('show');
  setTimeout(() => { APP.user = nu; showScr('onboard'); obGo(1); setBtn('signup-btn','Create Account',false); }, 600);
}

async function doResetPw() {
  const em = (document.getElementById('fp-em').value || '').trim().toLowerCase();
  const pw = document.getElementById('fp-pw').value;
  const pw2 = document.getElementById('fp-pw2').value;
  const err = document.getElementById('fp-err'), ok = document.getElementById('fp-ok');
  err.classList.remove('show'); ok.classList.remove('show');
  if (!em || !pw || !pw2) { err.textContent = 'All fields required.'; err.classList.add('show'); return; }
  if (!validEm(em)) { err.textContent = 'Invalid email.'; err.classList.add('show'); return; }
  const users = getUsers();
  if (!users[em]) { err.textContent = 'No account found with that email.'; err.classList.add('show'); return; }
  const pe = validPw(pw); if (pe) { err.textContent = pe; err.classList.add('show'); return; }
  if (pw !== pw2) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }
  setBtn('fp-btn','<span class="spin"></span>Saving...', true);
  const hash = await hashPw(pw);
  users[em].passwordHash = hash; saveUsers(users);
  ok.textContent = 'Password updated! You can now sign in.'; ok.classList.add('show');

async function doChangePw() {
  const oldPw = document.getElementById('cp-old').value;
  const newPw = document.getElementById('cp-new').value;
  const newPw2 = document.getElementById('cp-new2').value;
  const err = document.getElementById('cp-err'), ok = document.getElementById('cp-ok');
  err.classList.remove('show'); ok.classList.remove('show');
  if (!oldPw || !newPw || !newPw2) { err.textContent = 'All fields required.'; err.classList.add('show'); return; }
  if (newPw !== newPw2) { err.textContent = 'New passwords do not match.'; err.classList.add('show'); return; }
  const pe = validPw(newPw); if (pe) { err.textContent = pe; err.classList.add('show'); return; }
  setBtn('cp-btn','<span class="spin"></span>Checking...', true);
  const oldHash = await hashPw(oldPw);
  const users = getUsers();
  if (!APP.user || users[APP.user.email].passwordHash !== oldHash) {
    err.textContent = 'Current password is incorrect.'; err.classList.add('show');
    setBtn('cp-btn','Update Password', false); return;
  }
  const newHash = await hashPw(newPw);
  users[APP.user.email].passwordHash = newHash; saveUsers(users);
  ok.textContent = 'Password updated successfully.'; ok.classList.add('show');
  setBtn('cp-btn','Update Password', false);
  setTimeout(closeMod, 1500);
}

function renderHeatStrip() {
  const abbr = ['M','T','W','T','F','S','S'];
  const today = new Date(); const todayStr = today.toDateString();
  let html = '';
  for (let i = 0; i < 7; i++) {
    const dt = new Date(today); const dow = today.getDay();
    const diff = i - (dow === 0 ? 6 : dow - 1); dt.setDate(today.getDate() + diff);
    const dStr = dt.toDateString();
    const sp = getActiveSplit(); const dayDef = sp.days[i % sp.days.length];
    const isRest = dayDef.tag === 'rest';
    const exSt = sg('ex_' + APP.user.email + '_' + dStr) || {};
    const exCount = Object.keys(exSt).filter(k => exSt[k]).length;
    const totalEx = dayDef.ex ? dayDef.ex.length : 0;
    let cls = 'heat-dot';
    if (dStr === todayStr) cls += ' today-ring';
    if (isRest) cls += ' rest';
    else if (exCount > 0 && exCount === totalEx) cls += ' done';
    else if (exCount > 0) cls += ' partial';
    html += `<div class="heat-day"><div class="heat-lbl">${abbr[i]}</div><div class="${cls}"></div></div>`;
  }
  document.getElementById('heat-strip').innerHTML = html;
}

function renderToday(day) {
  const c = document.getElementById('today-content');
  if (day.tag === 'rest') {
    c.innerHTML = '<div class="rest-block"><div class="rest-sup">Rest Day Protocol</div><div class="rest-t">Active Recovery</div><div class="rest-s">Rest is where growth happens. Prioritize sleep, hit your protein target, and do light mobility work.</div></div>';
    return;
  }
  const done = day.ex.filter((_, i) => APP.exStates[i]).length;
  const pct = day.ex.length ? Math.round(done / day.ex.length * 100) : 0;
  const rows = day.ex.map((e, i) => { const d = !!APP.exStates[i]; return `
    <div class="ex-row" onclick="togEx(${i})" role="checkbox" aria-checked="${d}">
      <div class="ex-chk${d?' done':''}" id="ec-${i}">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#080909" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="ex-nm${d?' done':''}">${escH(e.n)}</div>
      <div class="ex-st">${escH(e.s)}</div>
    </div>`; }).join('');
  c.innerHTML = `
    <div class="card">
      <div class="card-hdr">
        <div class="card-t">${escH(day.name)}</div>
        <div class="card-b" id="ex-badge">${done}/${day.ex.length}</div>
      </div>
      <div style="width:100%;height:3px;background:var(--bg4)">
        <div style="height:3px;background:var(--lime);width:${pct}%;transition:width .4s ease" id="wprog"></div>
      </div>
      <div>${rows}</div>
    </div>`;
}

function togEx(i) {
  APP.exStates[i] = !APP.exStates[i];
  ss('ex_' + APP.user.email + '_' + new Date().toDateString(), APP.exStates);
  const day = getActiveSplit().days[APP.todayIdx % getActiveSplit().days.length];
  const done = day.ex.filter((_, j) => APP.exStates[j]).length;
  const pct = day.ex.length ? Math.round(done / day.ex.length * 100) : 0;
  day.ex.forEach((_, j) => {
    const el = document.getElementById('ec-' + j); if (!el) return;
    el.classList.toggle('done', !!APP.exStates[j]);
    const nm = el.nextElementSibling; if (nm) nm.classList.toggle('done', !!APP.exStates[j]);
  });
  const b = document.getElementById('ex-badge'); if (b) b.textContent = done + '/' + day.ex.length;
  const p = document.getElementById('wprog'); if (p) p.style.width = pct + '%';
  renderHeatStrip();
  if (day.ex.length > 0 && day.ex.every((_, j) => APP.exStates[j])) {
    APP.workouts++; ss('wk_' + APP.user.email, APP.workouts);
    const lastWk = sg('last_wk_' + APP.user.email); const todayStr = new Date().toDateString();
    if (lastWk !== todayStr) {
      const yd = new Date(); yd.setDate(yd.getDate() - 1);
      APP.streak = sg('last_wk_' + APP.user.email) === yd.toDateString() ? APP.streak + 1 : 1;
      ss('sk_' + APP.user.email, APP.streak); ss('last_wk_' + APP.user.email, todayStr);
      document.getElementById('streak-txt').textContent = APP.streak + '-Day Streak';
    }
    document.getElementById('s-wk').textContent = APP.workouts;
    document.getElementById('s-sk').textContent = APP.streak;
    setTimeout(() => mkModal(`<div class="mt">Workout Complete 🔥</div><div style="font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:18px">${day.name} session done. ${APP.streak} day streak. Keep going.</div><button class="pb" onclick="closeMod()">Close</button>`), 200);
  }
}

// GEMINI API CALL — fixed with proper error handling
// ════════════════════════════════════════════════════════
async function callGemini(payload) {
  const res = await fetch(GURL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const errText = await res.text();
    throw new Error('API error ' + res.status + ': ' + errText);
  }
  return res.json();
}

async function snapFood() {
  const video = document.getElementById('cam-video'), canvas = document.getElementById('cam-canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const imgData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  closeCam();
  showAIOverlay('Analyzing food image with AI...');
  try {
    const data = await callGemini({
      contents: [{ parts: [
        { inline_data: { mime_type: 'image/jpeg', data: imgData } },
        { text: 'You are a precise nutrition analyzer. Estimate the nutritional content of the food in this image. Respond ONLY with a valid JSON object (no markdown, no extra text, no code blocks). Format exactly: {"name":"food name","calories":250,"protein":20,"carbs":30,"fat":8,"serving":"estimated portion size","confidence":"high/medium/low","notes":"brief accuracy note"}' }
      ] }],
      generationConfig: { maxOutputTokens: 400, temperature: 0.1 }
    });
    hideAIOverlay();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    // Strip any markdown code blocks if present
    text = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    let food;
    try { food = JSON.parse(text); }
    catch { food = { name: 'Food (estimated)', calories: 200, protein: 15, carbs: 20, fat: 8, serving: '1 serving', confidence: 'low', notes: 'Could not parse AI response — please adjust manually.' }; }
    showFoodResult(food, 'AI Photo Scan');
  } catch(err) {
    hideAIOverlay();

// BARCODE SCANNER
// ════════════════════════════════════════════════════════
let barcodeActive = false;
async function openBarcodeScan() {
  document.getElementById('scan-overlay').style.display = 'flex';
  document.getElementById('scan-result-area').innerHTML = '';
  barcodeActive = true;
  try {
    await new Promise((resolve, reject) => {
      Quagga.init({
        inputStream: { name: 'Live', type: 'LiveStream', target: document.getElementById('barcode-scanner'), constraints: { facingMode: 'environment' } },
        decoder: { readers: ['ean_reader','upc_reader','upc_e_reader','ean_8_reader','code_128_reader'] },
        locate: true
      }, err => { if (err) reject(err); else resolve(); });
    });
    Quagga.start();
    Quagga.onDetected(async result => {
      if (!barcodeActive) return;
      const code = result.codeResult.code;
      barcodeActive = false;
      Quagga.stop();
      document.getElementById('scan-result-area').innerHTML = `<div style="background:var(--lime-bg);border:1px solid var(--lime-border);border-radius:var(--rsm);padding:10px 12px;font-size:12px;color:var(--lime);font-family:var(--fm)">Found: ${code} — looking up...</div>`;
      setTimeout(() => lookupBarcode(code), 300);
    });
  } catch(e) {
    closeScan();
    alert('Camera not available for barcode scanning. Please allow camera access.');
  }
}

function closeScan() {
  barcodeActive = false;
  try { Quagga.stop(); } catch(e) {}
  document.getElementById('scan-overlay').style.display = 'none';
}

async function lookupBarcode(code) {
  // First try Open Food Facts (free, no API key needed)
  try {
    const res = await fetch('https://world.openfoodfacts.org/api/v3/product/' + code + '.json', { mode: 'cors' });
    const data = await res.json();
    if (data.status === 'success' && data.product) {
      const p = data.product, n = p.nutriments || {};
      const food = {
        name: p.product_name || p.generic_name || 'Scanned Product',
        calories: Math.round(n['energy-kcal_100g'] || n['energy-kcal'] || 0),
        protein: Math.round((n.proteins_100g || n.proteins || 0) * 10) / 10,
        carbs: Math.round((n.carbohydrates_100g || n.carbohydrates || 0) * 10) / 10,
        fat: Math.round((n.fat_100g || n.fat || 0) * 10) / 10,
        serving: p.serving_size || '100g',
        confidence: 'high',
        source: 'Open Food Facts'
      };
      closeScan();
      showFoodResult(food, 'Barcode: ' + code);
      return;
    }
  } catch(e) { console.log('Open Food Facts lookup failed:', e); }

  // Fallback: ask Gemini
  closeScan();
  showAIOverlay('Looking up product ' + code + '...');
  try {
    const data = await callGemini({
      contents: [{ parts: [{ text: `Product barcode: ${code}. If you recognize this product, provide its nutritional info per typical serving. Respond ONLY with valid JSON (no markdown): {"name":"product name","calories":0,"protein":0,"carbs":0,"fat":0,"serving":"serving size","confidence":"low/medium/high"}. If unknown, use "Unknown Product (${code})" as name with zeros.` }] }],
      generationConfig: { maxOutputTokens: 200, temperature: 0.1 }
    });
    hideAIOverlay();
    let text = (data.candidates?.[0]?.content?.parts?.[0]?.text || '{}').replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    let food;
    try { food = JSON.parse(text); } catch { food = { name: 'Product (' + code + ')', calories: 0, protein: 0, carbs: 0, fat: 0, serving: '1 serving', confidence: 'low' }; }
    showFoodResult(food, 'Barcode: ' + code);
  } catch(e) {
    hideAIOverlay();
    openManualFood();
  }
}

function renderNutrition() {
  const u = APP.user; const today = new Date().toDateString();
  const fLog = sg('food_' + u.email + '_' + today) || [];
  const calTarget = parseInt(u.body && u.body.calTarget) || 2000;
  let totalCal = 0, totalP = 0, totalC = 0, totalF = 0;
  fLog.forEach(f => { totalCal += f.cal||0; totalP += f.protein||0; totalC += f.carbs||0; totalF += f.fat||0; });
  const pct = Math.min(100, Math.round(totalCal / calTarget * 100));
  document.getElementById('cal-pct-badge').textContent = pct + '%';
  document.getElementById('ring-cal-num').textContent = totalCal;
  document.getElementById('val-p').textContent = totalP + 'g';
  document.getElementById('val-c').textContent = totalC + 'g';
  document.getElementById('val-f').textContent = totalF + 'g';
  document.getElementById('val-rem').textContent = Math.max(0, calTarget - totalCal) + ' kcal';
  const pTarget = Math.round(calTarget * 0.3 / 4), cTarget = Math.round(calTarget * 0.45 / 4), fTarget = Math.round(calTarget * 0.25 / 9);
  document.getElementById('bar-p').style.width = Math.min(100, totalP / pTarget * 100) + '%';
  document.getElementById('bar-c').style.width = Math.min(100, totalC / cTarget * 100) + '%';
  document.getElementById('bar-f').style.width = Math.min(100, totalF / fTarget * 100) + '%';
  const circumference = 2 * Math.PI * 38;
  const pA = Math.min(totalP * 4 / calTarget * circumference, circumference);
  const cA = Math.min(totalC * 4 / calTarget * circumference, circumference - pA);
  const fA = Math.min(totalF * 9 / calTarget * circumference, circumference - pA - cA);
  document.getElementById('ring-protein').setAttribute('stroke-dasharray', pA + ' ' + circumference);
  document.getElementById('ring-carbs').setAttribute('stroke-dasharray', cA + ' ' + circumference);
  document.getElementById('ring-carbs').setAttribute('stroke-dashoffset', -pA);
  document.getElementById('ring-fat').setAttribute('stroke-dasharray', fA + ' ' + circumference);
  document.getElementById('ring-fat').setAttribute('stroke-dashoffset', -(pA + cA));

  const fll = document.getElementById('food-log-list');
  fll.innerHTML = fLog.length === 0
    ? '<div style="font-size:12px;color:var(--t3);font-family:var(--fm);padding:14px 0;text-align:center">No food logged today. Use the buttons above.</div>'
    : fLog.map((f, i) => `<div class="li">
        <div class="li-badge" style="color:var(--lime)">FOOD</div>
        <div style="flex:1"><div class="li-n">${escH(f.name)}</div><div class="li-v">${f.cal} kcal &nbsp; P:${f.protein}g &nbsp; C:${f.carbs}g &nbsp; F:${f.fat}g</div></div>
        <button class="li-d" onclick="delFood(${i})">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button></div>`).join('');

  const wLog = sg('wt_log_' + u.email) || []; const wUnit = u.body && u.body.weightUnit || 'lbs';
  const curW = wLog.length ? wLog[wLog.length-1].v : '--'; const goalW = u.body && u.body.goalWeight || '--';
  document.getElementById('cur-wt').textContent = curW; document.getElementById('wt-unit-d').textContent = wUnit;
  document.getElementById('goal-wt').textContent = goalW || '--'; document.getElementById('gw-unit-d').textContent = wUnit;
  if (wLog.length > 1) { const diff = (parseFloat(wLog[wLog.length-1].v) - parseFloat(wLog[wLog.length-2].v)).toFixed(1); const el = document.getElementById('wt-ch'); el.textContent = (diff > 0 ? '+' : '') + diff + ' since last'; el.className = 'mc-ch ' + (parseFloat(diff) > 0 ? 'up' : 'dn'); }
  if (goalW && goalW !== '--' && curW !== '--') { const d = (parseFloat(curW) - parseFloat(goalW)).toFixed(1); const el = document.getElementById('gw-diff'); el.textContent = parseFloat(d) > 0 ? d + ' to lose' : Math.abs(d) + ' to goal'; el.className = 'mc-ch ' + (parseFloat(d) > 0 ? 'up' : 'dn'); }
  if (wLog.length >= 2) { document.getElementById('wt-chart-card').style.display = 'block'; renderSparkline(wLog); }
  document.getElementById('wt-log-list').innerHTML = wLog.slice(-3).reverse().map((e, i) => `
    <div class="li">
      <div class="li-badge" style="color:var(--blue)">WT</div>
      <div style="flex:1"><div class="li-n">${e.v} ${wUnit}</div><div class="li-v">${new Date(e.date).toLocaleDateString()}${e.notes?' — '+escH(e.notes):''}</div></div>
      <button class="li-d" onclick="delWt(${wLog.length-1-i})">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button></div>`).join('');
  const bm = u.bodyMeasurements || {};
  ['chest','waist','hips','arms'].forEach(k => { const el = document.getElementById('bm-'+k); if (el) el.textContent = bm[k] || '--'; });
}

function renderSparkline(wLog) {
  const svg = document.getElementById('wt-spark'); if (!svg) return;
  const vals = wLog.map(e => parseFloat(e.v)).filter(v => !isNaN(v));
  if (vals.length < 2) return;
  const W = svg.clientWidth || 300, H = 48;
  const mn = Math.min(...vals) - 1, mx = Math.max(...vals) + 1;
  const pts = vals.map((v, i) => `${(i / (vals.length-1)) * W},${H - ((v-mn) / (mx-mn)) * H}`).join(' ');
  svg.innerHTML = `
    <defs><linearGradient id="sparkgrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="var(--lime)" stop-opacity="0.2"/><stop offset="100%" stop-color="var(--lime)" stop-opacity="0"/></linearGradient></defs>
    <polyline points="0,${H} ${pts} ${W},${H}" fill="url(#sparkgrad)" stroke="none"/>
    <polyline points="${pts}" fill="none" stroke="var(--lime)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${vals.map((v, i) => `<circle cx="${(i/(vals.length-1))*W}" cy="${H-((v-mn)/(mx-mn))*H}" r="3" fill="var(--lime)"/>`).join('')}`;
}

function buildCtx() {
  const u = APP.user; if (!u) return '';
  const sp = getActiveSplit(); const today = sp.days[APP.todayIdx % sp.days.length];
  const wLog = sg('wt_log_' + u.email) || []; const curW = wLog.length ? wLog[wLog.length-1].v + ' ' + (u.body && u.body.weightUnit || 'lbs') : 'unknown';
  const todayFoods = sg('food_' + u.email + '_' + new Date().toDateString()) || [];
  const totalCal = todayFoods.reduce((a, f) => a + (f.cal||0), 0);
  const totalP = todayFoods.reduce((a, f) => a + (f.protein||0), 0);
  const totalC = todayFoods.reduce((a, f) => a + (f.carbs||0), 0);
  const totalF = todayFoods.reduce((a, f) => a + (f.fat||0), 0);
  const bm = u.bodyMeasurements || {}; const b = u.body || {};
  const recentW = wLog.slice(-5).map(e => e.v).join(', ');
  const ciLog = sg('ci_log_' + u.email) || []; const lastCI = ciLog.length ? ciLog[ciLog.length-1] : {};
  const prs = sg('prs_' + u.email) || []; const prStr = prs.slice(-5).map(p => p.ex + ': ' + p.val + p.unit).join(', ');
  return `You are the KitoFit AI Coach — an elite personal trainer, nutritionist, and strength coach. You have complete access to this client's profile and real data. Be direct, evidence-based, motivating, and genuinely personal. Use their first name occasionally.

CLIENT: ${u.name} | Age: ${b.age||'?'} | Sex: ${b.sex||'?'} | Experience: ${u.experience||'intermediate'}
Goals: ${(u.goals||[]).join(', ')||'general fitness'}

BODY: Weight: ${curW} | Goal: ${b.goalWeight||'not set'} ${b.weightUnit||'lbs'} | Height: ${b.height||'?'} ${b.heightUnit||'cm'} | Calories/day: ${b.calTarget||'2000'}
Weight history (last 5): ${recentW||'none logged'}
Measurements: Chest ${bm.chest||'?'}in, Waist ${bm.waist||'?'}in, Hips ${bm.hips||'?'}in, Arms ${bm.arms||'?'}in

TRAINING: Program: ${sp.name} (${sp.freq})
Today: ${today.name}${today.tag!=='rest'&&today.ex.length?' — '+today.ex.slice(0,5).map(e=>e.n).join(', ')+(today.ex.length>5?' +more':''):''}
Streak: ${APP.streak} days | Total workouts: ${APP.workouts}
PRs: ${prStr||'none logged'}

TODAY'S NUTRITION: ${totalCal} kcal (P:${totalP}g C:${totalC}g F:${totalF}g) | Target: ${b.calTarget||2000} kcal/day
Foods: ${todayFoods.map(f=>f.name+'('+f.cal+'kcal)').join('; ')||'none yet'}
Last check-in: Mood ${lastCI.mood||'?'} | Notes: ${lastCI.notes||'none'}

Keep responses 3-6 sentences unless detail is requested. Be honest, not just positive.`;
}

function setupChat() {
  CHAT.length = 0; const msgs = document.getElementById('chat-msgs'); if (!msgs) return; msgs.innerHTML = '';
  const sp = getActiveSplit(); const today = sp.days[APP.todayIdx % sp.days.length];
  const u = APP.user; const b = u.body || {};
  const wLog = sg('wt_log_' + u.email) || []; const curW = wLog.length ? wLog[wLog.length-1].v + ' ' + (b.weightUnit||'lbs') : 'not logged yet';
  const todayFoods = sg('food_' + u.email + '_' + new Date().toDateString()) || [];
  const totalCal = todayFoods.reduce((a, f) => a + (f.cal||0), 0);
  let welcome = u.name.split(' ')[0] + ', ';
  if (today.tag === 'rest') welcome += 'rest day today. Recovery is where you grow — prioritize sleep and nutrition. You\'re at ' + curW + ' and have logged ' + totalCal + ' kcal. What do you need?';
  else welcome += 'today is ' + today.name + ' — ' + today.ex.length + ' exercises on the program. Current weight: ' + curW + '. ' + totalCal + ' kcal logged so far. What can I help with?';
  addMsg('ai', welcome);
}

function ctxP(p) { const msgs = document.getElementById('chat-msgs'); if (!msgs || msgs.children.length === 0) setupChat(); document.getElementById('chat-in').value = p; sendMsg(); }

function addMsg(role, text) {
  const msgs = document.getElementById('chat-msgs'); if (!msgs) return;
  const w = document.createElement('div');
  if (role === 'ai') w.innerHTML = '<div class="ai-nm">KITOFIT AI — GEMINI 2.0</div><div class="cb ai">' + text.replace(/\n/g, '<br>') + '</div>';
  else w.innerHTML = '<div class="cb user">' + escH(text) + '</div>';
  msgs.appendChild(w); msgs.scrollTop = msgs.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('chat-in');
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  CHAT.push({ role: 'user', parts: [{ text }] });
  addMsg('user', text);
  const msgs = document.getElementById('chat-msgs');
  const tw = document.createElement('div');
  tw.innerHTML = '<div class="ai-nm">KITOFIT AI</div><div class="cb ai"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div>';
  msgs.appendChild(tw); msgs.scrollTop = msgs.scrollHeight;
  try {
    const ctx = buildCtx();
    // System context injected as first user/model exchange
    const payload = {
      contents: [
        { role: 'user', parts: [{ text: 'SYSTEM CONTEXT:\n' + ctx + '\n\nAcknowledge you are ready.' }] },
        { role: 'model', parts: [{ text: 'Ready. I have your full profile loaded.' }] },
        ...CHAT
      ],
      generationConfig: { maxOutputTokens: 800, temperature: 0.75 }
    };
    const data = await callGemini(payload);
    tw.remove();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I had trouble responding. Please try again.';
    CHAT.push({ role: 'model', parts: [{ text: reply }] });
    addMsg('ai', reply);
  } catch(err) {
    tw.remove();
    console.error('Coach error:', err);
    addMsg('ai', 'Network error — check your connection and try again. (' + (err.message || 'Unknown error') + ')');
  }
}

const autoR = el => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; };

// ════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════
function goTab(t) {
  document.querySelectorAll('.tab').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n => { n.classList.remove('on'); n.removeAttribute('aria-current'); });
  document.getElementById('tab-' + t).classList.add('on');
  const order = ['today','schedule','nutrition','coach','profile'];
  const idx = order.indexOf(t);
  if (idx >= 0) { document.querySelectorAll('.ni')[idx].classList.add('on'); document.querySelectorAll('.ni')[idx].setAttribute('aria-current', 'page'); }
  document.getElementById('s-app').scrollTo(0, 0);
  if (t === 'coach' && !document.getElementById('chat-msgs').children.length) setupChat();
  if (t === 'nutrition') { renderNutrition(); renderPRs(); }
  if (t === 'profile') renderProfile();
  if (t === 'today') { renderHeatStrip(); }
}

// ════════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════════
function mkModal(html) {
  closeMod();
  const ov = document.createElement('div'); ov.className = 'mov'; ov.id = 'mmod';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  const sh = document.createElement('div'); sh.className = 'msh'; sh.innerHTML = html;
  ov.appendChild(sh);
  ov.onclick = e => { if (e.target === ov) closeMod(); };
  document.body.appendChild(ov);
  setTimeout(() => { const fi = sh.querySelector('input,select,textarea'); if (fi) fi.focus(); }, 100);
}
const closeMod = () => { const m = document.getElementById('mmod'); if (m) m.remove(); };

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const user = getSess();
  if (user) {
    if (user.onboardingDone === false) { APP.user = user; showScr('onboard'); obGo(1); }
    else initApp(user);
  }
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMod(); });
</script>
